<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>Thank You</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  font-family:'Inter', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#1e293b;
}

.slide {
  width:1280px;
  height:720px;
  padding:60px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* MAIN TITLE */
.title {
  font-family:'Poppins';
  font-size:64px;
  font-weight:800;
  margin-bottom:20px;
}

/* SUBTEXT */
.subtitle {
  font-size:20px;
  color:#475569;
  max-width:800px;
  line-height:1.6;
}

/* HIGHLIGHT */
.highlight {
  color:#3b82f6;
  font-weight:700;
}

/* CTA BOX */
.cta-box {
  margin-top:40px;
  padding:18px 40px;
  border-radius:50px;
  background: rgba(34,197,94,0.1);
  border:2px solid #22C55E;
}

.cta-text {
  font-family:'Poppins';
  font-size:22px;
  font-weight:700;
  color:#166534;
}

/* FOOT NOTE */
.footer {
  position:absolute;
  bottom:30px;
  font-size:14px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="slide">

  <div class="title">Thank You</div>

  <div class="subtitle">
    I hope you now clearly see how this partnership creates a 
    <span class="highlight">scalable, low-risk, high-revenue opportunity</span> 
    by combining <strong>network, content, and technology</strong>.
  </div>

  <div class="cta-box">
    <div class="cta-text">Let’s build this together 🚀</div>
  </div>

  <div class="footer">
    UEducate × Chrysalis Partnership
  </div>

</div>

</body>
</html>
