<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Presentation</title>
<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
  }

  .frame-container { 
    width: 100vw; 
    height: 100vh; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
  }

  iframe { 
    width: 1280px; 
    height: 720px; 
    border: none; 
    background: #f8fafc; 
  }

  .slide-number { 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    background: rgba(255,255,255,0.95); 
    padding: 6px 12px; 
    border-radius: 20px; 
    font-weight: 700; 
    z-index: 9999; 
  }

  /* SMALL NAV ARROWS */
  .nav-arrow {
    position: fixed;
    bottom: 20px;
    font-size: 28px;
    color: #333;
    background: rgba(255,255,255,0.9);
    padding: 6px 12px;
    border-radius: 50%;
    cursor: pointer;
    user-select: none;
    transition: background 0.3s, color 0.3s;
    z-index: 9999;
  }
  .nav-arrow:hover {
    background: #333;
    color: white;
  }
  .nav-left { left: 20px; }
  .nav-right { right: 20px; }
</style>
</head>
<body>
<div class="slide-number" id="slideNumber">Slide 1/12</div>

<div class="frame-container">
  <iframe id="frame" src="slide1.html"></iframe>
</div>

<!-- Small navigation arrows -->
<div class="nav-arrow nav-left" onclick="prevSlide()">&#8592;</div>
<div class="nav-arrow nav-right" onclick="nextSlide()">&#8594;</div>

<script>
const slides = [
  "slide1.html","slide2.html","slide3.html","slide4.html","slide5.html",
  "slide6.html","slide7.html","slide8.html","slide10.html","slide11.html",
  "slide12.html","slide13.html"
];

let index = 0;
const frame = document.getElementById("frame");
const slideNumber = document.getElementById("slideNumber");

function loadSlide() {
  frame.src = slides[index];
  slideNumber.textContent = `Slide ${index+1}/${slides.length}`;
}

function nextSlide() {
  if(index < slides.length - 1) index++;
  loadSlide();
}

function prevSlide() {
  if(index > 0) index--;
  loadSlide();
}

// Keyboard controls
document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight") nextSlide();
  if(e.key === "ArrowLeft") prevSlide();
});
</script>

</body>
</html>
