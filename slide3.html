<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280, height=720, initial-scale=1.0" />
<title>Market Opportunity Calculation - Slide 3</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  font-family: 'Inter', sans-serif;
  color: #1e293b;
}

.slide-container {
  width: 1280px;
  height: 720px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
}

.overlay { display: none !important; }

.content-wrapper {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
  padding: 40px 50px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.header-section {
  text-align: center;
  margin-bottom: 30px;
}

.main-title {
  font-family: 'Poppins', sans-serif;
  font-weight: 700;
  font-size: 44px;
  color: #1e293b;
  margin: 0;
}

.highlight-text { color: #3b82f6; }

.calculation-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 40px 0;
}

/* ORIGINAL CARD */
.calc-card {
  width: 210px;
  padding: 22px 15px;
  border-radius: 16px;
  text-align: center;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(226, 232, 240, 0.8);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  transition: all 0.4s ease;
}

.calc-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
}

.result-card {
  width: 240px;
  background: rgba(255, 255, 255, 0.95);
  border: 2px solid rgba(5, 150, 105, 0.3);
  box-shadow: 0 15px 40px rgba(5, 150, 105, 0.15);
}

.icon-circle {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  margin: 0 auto 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #3b82f6;
  background: rgba(59, 130, 246, 0.1);
  border: 2px solid rgba(59, 130, 246, 0.2);
}

.card-number {
  font-family: 'Poppins';
  font-size: 32px;
  font-weight: 700;
  color: #1e293b;
  margin: 0;
}

.result-card .card-number {
  font-size: 40px;
  color: #059669;
}

.card-label {
  font-size: 25px;
  color: #64748b;
  margin: 4px 0 0 0;
}

.operator {
  font-size: 32px;
  color: #64748b;
  font-weight: 500;
  min-width: 30px;
  text-align: center;
}

.bottom-highlight-container {
  text-align: center;
}

.highlight-pill {
  display: inline-block;
  padding: 16px 32px;
  border-radius: 50px;
  border: 2px solid rgba(59, 130, 246, 0.3);
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

.highlight-message {
  font-family: 'Poppins';
  font-size: 20px;
  color: #1e293b;
  margin: 0;
}

.highlight-emphasis {
  color: #3b82f6;
  font-weight: 700;
}

.slide-number {
  position: absolute;
  bottom: 30px;
  right: 40px;
  font-size: 14px;
  color: #94a3b8;
  font-weight: 500;
}

/* 🔥 ADDED ANIMATION ONLY */
.calc-card, .operator, .highlight-pill {
  opacity: 0;
  transform: scale(0.6);
  transition: all 0.5s ease;
}

.show {
  opacity: 1 !important;
  transform: scale(1) !important;
}
</style>
</head>

<body>
<div class="slide-container">
<div class="content-wrapper">

<div class="header-section">
  <h1 class="main-title">
    Your Existing Reach = <span class="highlight-text">Revenue Potential</span>
  </h1>
</div>

<div class="calculation-container">

  <div class="calc-card step">
    <div class="icon-circle"><i class="fa-solid fa-school"></i></div>
    <p class="card-number">2,000</p>
    <p class="card-label">Schools</p>
  </div>

  <div class="operator step">×</div>

  <div class="calc-card step">
    <div class="icon-circle"><i class="fa-solid fa-chalkboard-user"></i></div>
    <p class="card-number">10</p>
    <p class="card-label">Classes/School</p>
  </div>

  <div class="operator step">×</div>

  <div class="calc-card step">
    <div class="icon-circle"><i class="fa-solid fa-users"></i></div>
    <p class="card-number">30</p>
    <p class="card-label">Students/Class</p>
  </div>

  <div class="operator step">=</div>

  <div class="calc-card result-card step">
    <div class="icon-circle"><i class="fa-solid fa-graduation-cap"></i></div>
    <p class="card-number">6,00,000</p>
    <p class="card-label">Total Students</p>
  </div>

</div>

<div class="bottom-highlight-container">
  <div class="highlight-pill step">
    <p class="highlight-message">
      <span class="highlight-emphasis">6 Lakh Students</span> Already Within Your Ecosystem
    </p>
  </div>
</div>

<div class="slide-number">03 / 12</div>

</div>
</div>

<!-- 🔥 CLICK ANIMATION -->
<script>
let step = 0;
const steps = document.querySelectorAll(".step");

document.addEventListener("click", () => {
  if(step < steps.length){
    steps[step].classList.add("show");
    step++;
  }
});
</script>

</body>
</html>
