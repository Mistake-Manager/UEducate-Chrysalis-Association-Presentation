<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Perfect Alignment</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>

/* BODY */
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  font-family: 'Inter', sans-serif;
  color: #1e293b;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* SLIDE */
.slide-container {
  width: 1280px;
  height: 720px;
  display: flex;
  flex-direction: column;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  padding: 50px;
  box-sizing: border-box;
}

/* CONTENT */
.content-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 30px;
}

.subtitle {
  font-size: 16px;
  font-weight: 600;
  color: #3b82f6;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.main-title {
  font-family: 'Poppins';
  font-size: 48px;
  font-weight: 700;
  color: #1e293b;
}

/* ALIGNMENT */
.alignment-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
}

/* CARDS */
.partner-card {
  width: 340px;
  height: 280px;
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border: 1px solid rgba(226,232,240,0.8);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);

  opacity: 0;
  transform: scale(0.7);
}

.green { border-top: 4px solid #16a34a; }
.blue { border-top: 4px solid #3b82f6; }

/* BLOOM */
.show {
  animation: bloom 0.6s ease forwards;
}

@keyframes bloom {
  0% { opacity: 0; transform: scale(0.7); }
  70% { opacity: 1; transform: scale(1.05); }
  100% { opacity: 1; transform: scale(1); }
}

/* LOGO */
.logo {
  width: 90px;
  height: 100px;
  margin: 0 auto 15px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chrysalis-logo {
  width: 120px;
  height: 110px;
}

.ueducate-logo {
  width: 80px;
  height: 90px;
}

.logo img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* TEXT */
.card-value {
  font-family: 'Poppins';
  font-size: 24px;
  font-weight: 600;
  color: #1e293b;
}

/* CONNECTOR */
.connector {
  display: flex;
  align-items: center;
  gap: 10px;
}

.line {
  width: 40px;
  height: 2px;
  background: #94a3b8;
}

.plus {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #f59e0b;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f59e0b;
  font-size: 20px;
  font-weight: bold;
}

/* RESULT */
.result-box {
  margin-top: 30px;
  text-align: center;
  padding: 15px;
  border: 1px solid #22C55E;
  border-radius: 10px;
  background: rgba(34,197,94,0.1);
  font-family: 'Poppins';
  color: #166534;

  opacity: 0;
  transform: scale(0.7);
}

</style>
</head>

<body>

<div class="slide-container">
  <div class="content-wrapper">

    <!-- HEADER -->
    <div class="header">
      <div class="subtitle">Why This Works</div>
      <div class="main-title">Perfect Alignment</div>
    </div>

    <!-- MAIN -->
    <div class="alignment-container">

      <!-- LEFT -->
      <div class="partner-card green" id="leftCard">
        <div class="logo chrysalis-logo">
          <img src="images/Chrysalis-logo.jpeg">
        </div>
        <div class="card-value">Content + Strong Network</div>
      </div>

      <!-- CENTER -->
      <div class="connector">
        <div class="line"></div>
        <div class="plus">+</div>
        <div class="line"></div>
      </div>

      <!-- RIGHT -->
      <div class="partner-card blue" id="rightCard">
        <div class="logo ueducate-logo">
          <img src="images/UEducate-logo.png">
        </div>
        <div class="card-value">Technology + Content</div>
      </div>

    </div>

    <!-- RESULT -->
    <div class="result-box" id="resultBox">
      High Revenue with <span style="color:#3b82f6;">Minimal Operational Effort</span>
    </div>

  </div>
</div>

<script>
let step = 0;

document.addEventListener("click", () => {
  step++;

  if(step === 1){
    document.getElementById("leftCard").classList.add("show");
  }

  if(step === 2){
    document.getElementById("rightCard").classList.add("show");

    // AUTO SHOW RESULT AFTER 1 SECOND
    setTimeout(() => {
      document.getElementById("resultBox").classList.add("show");
    }, 1000);
  }
});
</script>

</body>
</html>
