<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, height=720, initial-scale=1.0" />
  <title>About Chrysalis - Slide 2</title>

  <!-- Styles -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      font-family: 'Inter', sans-serif;
      color: #1e293b;
    }

    .slide-container {
      width: 1280px;
      height: 720px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
    }

    .section-tag {
      font-size: 16px;
      font-weight: 600;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }

    .main-heading {
      font-family: 'Poppins', sans-serif;
      font-size: 48px;
      font-weight: 700;
      margin: 0 0 10px 0;
      color: #1e293b;
      line-height: 1.2;
    }

    /* CARDS - Light Professional */
    .cards-grid {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: stretch;
      margin-top: 40px;
      flex: 1;
    }

    .feature-card {
      flex: 1;
      padding: 40px 24px;
      border-radius: 20px;
      text-align: center;
      position: relative;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .feature-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      border: 2px solid rgba(59, 130, 246, 0.2);
    }

    .card-title {
      font-family: 'Poppins';
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1e293b;
    }

    .card-desc {
      font-size: 16px;
      color: #64748b;
      line-height: 1.5;
    }

    /* FOOTER */
    .footer-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: auto;
      padding-top: 30px;
    }

    .closing-line {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #059669;
      padding: 16px 32px;
      border-radius: 50px;
      background: rgba(5, 150, 105, 0.08);
      border: 2px solid rgba(5, 150, 105, 0.2);
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(5, 150, 105, 0.15);
      transition: all 0.3s ease;
    }

    .closing-line:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(5, 150, 105, 0.25);
    }

    /* ANIMATION */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-anim { animation: fadeInUp 0.8s forwards; opacity: 0; }
    .anim-delay-1 { animation: fadeInUp 0.8s 0.1s forwards; opacity: 0; }
    .anim-delay-2 { animation: fadeInUp 0.8s 0.3s forwards; opacity: 0; }
    .anim-delay-4 { animation: fadeInUp 0.8s 0.7s forwards; opacity: 0; }
    .anim-delay-5 { animation: fadeInUp 0.8s 0.9s forwards; opacity: 0; }

    .slide-number {
      position: absolute;
      bottom: 30px;
      right: 40px;
      font-size: 14px;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>

<body>

  <div class="slide-container">

    <div class="content-wrapper">

      <!-- HEADER -->
      <div class="header-anim">
        <p class="section-tag">About Chrysalis</p>
        <h1 class="main-heading">A Strong & Established Network</h1>
      </div>

      <!-- CARDS -->
      <div class="cards-grid">
        <div class="feature-card anim-delay-1">
          <div class="icon-wrapper"><i class="fas fa-building-columns"></i></div>
          <p class="card-title">2000+<br>Schools</p>
          <p class="card-desc">Extensive presence across institutions</p>
        </div>

        <div class="feature-card anim-delay-2">
          <div class="icon-wrapper"><i class="fas fa-handshake-simple"></i></div>
          <p class="card-title">Trusted by<br>Educators</p>
          <p class="card-desc">High credibility built over time</p>
        </div>

        <div class="feature-card anim-delay-4">
          <div class="icon-wrapper"><i class="fas fa-shapes"></i></div>
          <p class="card-title">Activity-Based<br>Learning</p>
          <p class="card-desc">Innovative learning approach</p>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="footer-container anim-delay-5">
        <p class="closing-line">
          <i class="fas fa-check-circle"></i>
          A powerful distribution network already in place
        </p>
      </div>

      <div class="slide-number">02 / 12</div>

    </div>
  </div>

</body>
</html>
