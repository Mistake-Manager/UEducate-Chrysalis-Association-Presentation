<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, height=720">
<title>UEducate × Chrysalis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Inter', sans-serif;
}

/* SLIDE */
.slide {
  width: 1280px;
  height: 720px;
  padding: 70px 80px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* TOP LINE */
.top-line {
  font-size: 14px;
  letter-spacing: 2px;
  color: #3b82f6;
  font-weight: 600;
}

/* MAIN GRID */
.main {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* LEFT SIDE */
.left {
  width: 45%;
}

/* TITLE */
.title {
  font-family: 'Poppins';
  font-size: 48px;
  font-weight: 700;
  color: #111827;
  line-height: 1.2;
}

/* SUB */
.subtitle {
  margin-top: 15px;
  font-size: 18px;
  color: #6b7280;
}

/* VALUE */
.value {
  margin-top: 40px;
  font-family: 'Poppins';
  font-size: 72px;
  font-weight: 800;
  color: #2563eb;
}

.value-text {
  font-size: 18px;
  color: #6b7280;
}

/* RIGHT SIDE LOGOS */
.right {
  width: 45%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
}

/* BIG LOGOS */
.logo {
  height: 200px;
  object-fit: contain;
}

/* CONNECTOR */
.connector {
  font-size: 40px;
  color: #94a3b8;
  font-weight: 600;
}

/* FOOTER */
.footer {
  text-align: center;
  font-size: 14px;
  color: #9ca3af;
}

</style>
</head>

<body>

<div class="slide">

  <!-- TOP -->
  <div class="top-line">STRATEGIC PARTNERSHIP</div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT CONTENT -->
    <div class="left">
      <div class="title">
        Unlocking Scalable Revenue Through Collaboration
      </div>

      <div class="subtitle">
        Combining network strength, content excellence, and technology
      </div>

      <div class="value">₹60+ Cr</div>
      <div class="value-text">Revenue Opportunity</div>
    </div>

    <!-- RIGHT LOGOS -->
    <div class="right">
      <img src="images/Chrysalis-logo.jpeg" class="logo">
      <div class="connector">×</div>
      <img src="images/UEducate-logo.png" class="logo">
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    Chrysalis × UEducate Association
  </div>

</div>

</body>
</html>
